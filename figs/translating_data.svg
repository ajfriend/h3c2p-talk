<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" width="600" height="260">
  <defs>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
    <marker id="arrowL" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#555" />
    </marker>
  </defs>

  <!-- lat/lng points bubble -->
  <rect x="20" y="30" rx="30" ry="30" width="180" height="60" fill="#4a90d9" opacity="0.85" />
  <text x="110" y="67" text-anchor="middle" fill="white" font-family="sans-serif" font-size="18" font-weight="bold">lat/lng points</text>

  <!-- polygons bubble -->
  <rect x="20" y="160" rx="30" ry="30" width="180" height="60" fill="#4a90d9" opacity="0.85" />
  <text x="110" y="197" text-anchor="middle" fill="white" font-family="sans-serif" font-size="18" font-weight="bold">polygons</text>

  <!-- H3 cells bubble -->
  <rect x="400" y="95" rx="30" ry="30" width="180" height="60" fill="#e8873a" opacity="0.9" />
  <text x="490" y="132" text-anchor="middle" fill="white" font-family="sans-serif" font-size="18" font-weight="bold">H3 cells</text>

  <!-- Arrow: lat/lng -> cells -->
  <line x1="210" y1="52" x2="390" y2="115" stroke="#555" stroke-width="2.5" marker-end="url(#arrowR)" />
  <!-- Arrow: cells -> lat/lng -->
  <line x1="390" y1="125" x2="210" y2="62" stroke="#555" stroke-width="2.5" marker-end="url(#arrowL)" />

  <!-- Arrow: polygons -> cells -->
  <line x1="210" y1="182" x2="390" y2="135" stroke="#555" stroke-width="2.5" marker-end="url(#arrowR)" />
  <!-- Arrow: cells -> polygons -->
  <line x1="390" y1="145" x2="210" y2="192" stroke="#555" stroke-width="2.5" marker-end="url(#arrowL)" />
</svg>
